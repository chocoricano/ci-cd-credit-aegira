version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: aegira-loan-postgres-after
    environment:
      POSTGRES_DB: aegira_loan
      POSTGRES_USER: aegira
      POSTGRES_PASSWORD: aegira_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegira -d aegira_loan"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:5.0.3-alpine
    container_name: aegira-loan-redis-after
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: 
      context: ./aegira-loan-service
    container_name: aegira-loan-app-after
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aegira_loan
      SPRING_DATASOURCE_USERNAME: aegira
      SPRING_DATASOURCE_PASSWORD: aegira_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change-this-secret
      JWT_EXPIRATION: 3600000
      LOAN_DATA_SOURCE_MODE: ${LOAN_DATA_SOURCE_MODE:-DATABASE}
      IDEMPOTENCY_ENABLED: ${IDEMPOTENCY_ENABLED:-true}
      IDEMPOTENCY_TTL_SECONDS: 86400

  frontend:
    build:
      context: ./creditappdemo
    container_name: aegira-loan-frontend
    depends_on:
      - app
    ports:
      - "4173:4173"
    environment:
      VITE_API_BASE_URL: http://app:8080

volumes:
  postgres_data:
  redis_data:
